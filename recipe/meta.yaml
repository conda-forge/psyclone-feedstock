{% set name = "psyclone" %}
{% set version = "3.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/psyclone-{{ version }}.tar.gz
  sha256: 9d256cc4ee1494286b1ed8b4b8447b576748008ea5e236159717db1ddc3bd09a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pyparsing
    - fparser ==0.2.4
    - configparser
    - jsonschema
    - sympy <=1.13.3
    - jinja2
    - termcolor
    - python-graphviz

test:
  imports:
    - psyclone
  commands:
    - pip check
    - psyclone --version  # [not win] CLI not available on Windows
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/stfc/psyclone
  summary: PSyclone - a compiler for Finite Element/Volume/Difference DSLs in Fortran
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sergisiso
    - ScottWales
